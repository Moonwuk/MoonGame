name: Android APK (prototype)

# Builds an installable debug APK of the prototype by wrapping the self-contained
# prototype HTML in a Capacitor WebView. Runs on GitHub's ubuntu runner, which has
# the Android SDK preinstalled. Download the APK from the run's artifacts.
# Actions are SHA-pinned (SD-6.1 / F-16); the trailing `# vN` comments track versions.

on:
  workflow_dispatch:
  push:
    branches: [main, claude/awesome-bohr-ygnunp]
    paths:
      - 'prototype/**'
      - 'mobile/**'
      - '.github/workflows/android.yml'

permissions:
  contents: read

jobs:
  build-apk:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4 (version from package.json "packageManager")

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build the prototype (self-contained HTML)
        run: |
          pnpm install --frozen-lockfile
          pnpm run prototype

      - name: Stage web assets + install Capacitor
        working-directory: mobile
        run: |
          mkdir -p www
          cp ../prototype/dist/void-dominion.html www/index.html
          npm install

      - name: Generate the Android project
        working-directory: mobile
        run: |
          npx cap add android
          npx cap sync android

      - name: Assemble debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: void-dominion-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
